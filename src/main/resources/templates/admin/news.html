<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head th:replace="~{admin/layout :: head('Quản lý tin tức')}"></head>

<body class="admin-body">

    <aside th:replace="~{admin/layout :: sidebar}"></aside>

    <div class="admin-main">

        <header th:replace="~{admin/layout :: topbar('Quản lý tin tức')}"></header>

        <main class="admin-content">

            <div class="page-header">
                
                <button class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Viết bài mới
                </button>
            </div>

            <div class="card">

                <form class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Tìm theo tiêu đề bài viết...">
                    </div>

                    <button class="btn btn-secondary btn-sm">
                        <i class="fas fa-search"></i>
                        Tìm
                    </button>

                    <button class="btn btn-secondary btn-sm">
                        <i class="fas fa-redo"></i>
                        Reset
                    </button>
                </form>

                <div class="table-wrapper">

                    <table class="table">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Ảnh</th>
                                <th>Tiêu đề</th>
                                <th>Tác giả</th>
                                <th>Lượt xem</th>
                                <th>Trạng thái</th>
                                <th>Ngày đăng</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr th:each="n : ${newsList}">

                                <td class="id-cell" th:text="${n.id}"></td>

                                <td>
                                    <img class="product-img"
                                         th:src="${n.image}"
                                         onerror="this.src='https://via.placeholder.com/48x48/fdf2f8/ec4899?text=NEWS'">
                                </td>

                                <td>
                                    <div class="product-name" th:text="${n.title}"></div>

                                    <div class="product-desc"
                                         th:text="${#strings.abbreviate(n.summary,60)}"></div>
                                </td>

                                <td th:text="${n.author}"></td>

                                <td>
                                    <span class="badge badge-info">
                                        <i class="fas fa-eye"></i>
                                        <span th:text="${n.viewCount}"></span>
                                    </span>
                                </td>

                                <td>
                                    <span
                                        th:classappend="${n.isPublished} ?
                                        'badge badge-success' :
                                        'badge badge-warning'"
                                        th:text="${n.isPublished} ? 'Đã đăng' : 'Nháp'">
                                    </span>
                                </td>

                                <td th:text="${n.publishedAt != null ?
                                    #temporals.format(n.publishedAt,'dd/MM/yyyy') : '-'}">
                                </td>

                                <td>

                                    <div class="action-btns">

                                        <a th:href="@{/admin/news/{id}(id=${n.id})}"
                                           class="icon-btn view"
                                           title="Xem">
                                            <i class="fas fa-eye"></i>
                                        </a>

                                        <button class="icon-btn edit" title="Sửa">
                                            <i class="fas fa-pen"></i>
                                        </button>

                                        <button class="icon-btn delete" title="Xóa">
                                            <i class="fas fa-trash"></i>
                                        </button>

                                    </div>

                                </td>

                            </tr>

                            <tr th:if="${newsList.empty}">

                                <td colspan="8">

                                    <div class="empty-state">

                                        <i class="fas fa-newspaper"></i>

                                        <h4>Chưa có bài viết nào</h4>

                                        <p>Nhấn "Viết bài mới" để tạo bài viết đầu tiên.</p>

                                    </div>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </main>

    </div>

    <th:block th:replace="~{admin/layout :: modalScripts}"></th:block>

</body>

</html>
