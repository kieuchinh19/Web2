<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head th:replace="~{admin/layout :: head('Quản lý thương hiệu')}"></head>

<body class="admin-body">
    <aside th:replace="~{admin/layout :: sidebar}"></aside>

    <div class="admin-main">
        <header th:replace="~{admin/layout :: topbar('Quản lý thương hiệu')}"></header>
        <main class="admin-content">

            <div th:if="${message}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
            </div>
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <div class="page-header">
                <div>
                    <h2 style="font-size:18px;font-weight:700;">Danh sách thương hiệu</h2>
                    <p style="font-size:12px;color:var(--text-muted);">
                        Tổng cộng <b th:text="${totalItems}">0</b> thương hiệu
                    </p>
                </div>
                <div style="display:flex; gap:8px;">
                    <a th:href="@{/admin/brands/trash}" class="btn btn-secondary">
                        <i class="fas fa-trash-restore"></i> Thùng rác
                    </a>
                    <button class="btn btn-primary" onclick="openBrandModal()">
                        <i class="fas fa-plus"></i> Thêm thương hiệu
                    </button>
                </div>
            </div>

            <div class="card">
                <form class="toolbar" th:action="@{/admin/brands}" method="get">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" name="keyword" th:value="${keyword}"
                            placeholder="Tìm theo tên thương hiệu...">
                    </div>
                    <input type="hidden" name="size" th:value="${pageSize}">
                    <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-search"></i> Tìm</button>
                    <a th:href="@{/admin/brands}" class="btn btn-secondary btn-sm"><i class="fas fa-redo"></i> Reset</a>
                </form>

                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width:60px">ID</th>
                                <th style="width:80px">Logo</th>
                                <th>Tên thương hiệu</th>
                                <th>Quốc gia</th>
                                <th>Mô tả</th>
                                <th>Số sản phẩm</th>
                                <th style="width:130px">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="b : ${brands}">
                                <td class="id-cell" th:text="${b.id}">1</td>
                                <td>
                                    <img class="product-img" th:src="${b.logo}"
                                        onerror="this.src='https://via.placeholder.com/48x48/fdf2f8/ec4899?text=LOGO'"
                                        alt="logo">
                                </td>
                                <td>
                                    <div class="product-name" th:text="${b.name}">Tên</div>
                                </td>
                                <td><span class="badge badge-info" th:text="${b.country}">Country</span></td>
                                <td th:text="${#strings.abbreviate(b.description, 50)}">Mô tả</td>
                                <td><span class="badge badge-success" th:text="${b.productCount} + ' SP'">0 SP</span>
                                </td>
                                <td>
                                    <div class="action-btns">
                                        <button class="icon-btn edit" th:onclick="'openBrandModal(' + ${b.id} + ')'"
                                            title="Sửa">
                                            <i class="fas fa-pen"></i>
                                        </button>
                                        <form th:action="@{/admin/brands/delete/{id}(id=${b.id})}" method="post"
                                            style="display:inline"
                                            onsubmit="return confirmDelete('Thương hiệu sẽ được chuyển vào thùng rác. Bạn có chắc muốn xóa?');">
                                            <button type="submit" class="icon-btn delete" title="Xóa (chuyển vào thùng rác)">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${brands == null or brands.empty}">
                                <td colspan="7">
                                    <div class="empty-state">
                                        <i class="fas fa-award"></i>
                                        <h4>Chưa có thương hiệu nào</h4>
                                        <p>Nhấn "Thêm thương hiệu" để tạo mới</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" th:if="${totalPages > 1}">
                    <a th:href="@{/admin/brands(page=0, size=${pageSize}, keyword=${keyword})}"
                        th:classappend="${currentPage == 0} ? 'disabled' : ''">
                        <i class="fas fa-angle-double-left"></i>
                    </a>
                    <a th:href="@{/admin/brands(page=${currentPage - 1}, size=${pageSize}, keyword=${keyword})}"
                        th:classappend="${currentPage == 0} ? 'disabled' : ''">
                        <i class="fas fa-angle-left"></i>
                    </a>
                    <span th:each="i : ${#numbers.sequence(pageStart, pageEnd)}">
                        <a th:href="@{/admin/brands(page=${i}, size=${pageSize}, keyword=${keyword})}"
                            th:classappend="${i == currentPage} ? 'active' : ''" th:text="${i + 1}">1</a>
                    </span>
                    <a th:href="@{/admin/brands(page=${currentPage + 1}, size=${pageSize}, keyword=${keyword})}"
                        th:classappend="${currentPage + 1 >= totalPages} ? 'disabled' : ''">
                        <i class="fas fa-angle-right"></i>
                    </a>
                    <a th:href="@{/admin/brands(page=${totalPages - 1}, size=${pageSize}, keyword=${keyword})}"
                        th:classappend="${currentPage + 1 >= totalPages} ? 'disabled' : ''">
                        <i class="fas fa-angle-double-right"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="brandModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="brandModalTitle">Thêm thương hiệu mới</h3>
                <button class="modal-close" data-close-modal><i class="fas fa-times"></i></button>
            </div>
            <form id="brandForm" th:action="@{/admin/brands/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" id="brandId">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Tên thương hiệu *</label>
                        <input class="form-control" name="name" id="brandName" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Quốc gia</label>
                            <input class="form-control" name="country" id="brandCountry">
                        </div>
                        <div class="form-group">
                            <label>Website</label>
                            <input class="form-control" name="website" id="brandWebsite" placeholder="https://...">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Logo thương hiệu</label>
                        <div class="image-upload">
                            <div class="image-preview" id="logoPreview">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Chưa có logo</span>
                            </div>
                            <div class="image-upload-actions">
                                <label class="btn btn-secondary btn-sm" for="logoFileInput">
                                    <i class="fas fa-upload"></i> Chọn file
                                </label>
                                <input type="file" id="logoFileInput" name="logoFile" accept="image/*"
                                    style="display:none" onchange="handleLogoFile(this)">
                                <span style="margin:0 6px;color:#888;">hoặc</span>
                                <input type="text" name="logoUrl" id="brandLogoUrl" class="form-control"
                                    style="flex:1;min-width:180px;" placeholder="Dán URL logo (https://...)"
                                    oninput="handleLogoUrl(this.value)">
                            </div>
                        </div>
                        <input type="hidden" name="logo" id="brandLogo">
                    </div>
                    <div class="form-group">
                        <label>Mô tả</label>
                        <textarea class="form-control" name="description" id="brandDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-close-modal>Hủy</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <th:block th:replace="~{admin/layout :: modalScripts}"></th:block>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const brandsData = /*[[${brands}]]*/[];
        function openBrandModal(id) {
            document.getElementById('brandForm').reset();
            document.getElementById('brandId').value = '';
            document.getElementById('brandLogo').value = '';
            document.getElementById('brandLogoUrl').value = '';
            document.getElementById('logoFileInput').value = '';
            document.getElementById('brandModalTitle').textContent = 'Thêm thương hiệu mới';
            resetLogoPreview();
            if (id) {
                const b = brandsData.find(x => x.id === id);
                if (b) {
                    document.getElementById('brandModalTitle').textContent = 'Sửa thương hiệu #' + id;
                    document.getElementById('brandId').value = b.id || '';
                    document.getElementById('brandName').value = b.name || '';
                    document.getElementById('brandCountry').value = b.country || '';
                    document.getElementById('brandWebsite').value = b.website || '';
                    document.getElementById('brandLogo').value = b.logo || '';
                    document.getElementById('brandLogoUrl').value = b.logo || '';
                    if (b.logo) showLogoPreview(b.logo);
                }
            }
            openModal('brandModal');
        }

        function resetLogoPreview() {
            const preview = document.getElementById('logoPreview');
            preview.innerHTML = '<i class="fas fa-cloud-upload-alt"></i><span>Chưa có logo</span>';
            preview.classList.remove('has-image');
        }

        function showLogoPreview(url) {
            if (!url) { resetLogoPreview(); return; }
            const preview = document.getElementById('logoPreview');
            preview.innerHTML = '<img src="' + url + '" alt="preview" onerror="resetLogoPreview()">';
            preview.classList.add('has-image');
        }

        function handleLogoFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    showLogoPreview(e.target.result);
                    document.getElementById('brandLogo').value = '';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleLogoUrl(url) {
            document.getElementById('brandLogo').value = url;
            if (url && url.trim().length > 0) showLogoPreview(url.trim());
            else resetLogoPreview();
        }
        /*]]>*/
    </script>
</body>

</html>
