<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head th:replace="~{admin/layout :: head('Quản lý người dùng')}"></head>

<body class="admin-body">

    <aside th:replace="~{admin/layout :: sidebar}"></aside>

    <div class="admin-main">

        <header th:replace="~{admin/layout :: topbar('Quản lý người dùng')}"></header>

        <main class="admin-content">

            <div class="page-header">
               
                <button class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Thêm người dùng
                </button>
            </div>

            <div class="card">

                <form class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Tìm kiếm người dùng...">
                    </div>

                    <button class="btn btn-secondary btn-sm">
                        <i class="fas fa-search"></i>
                        Tìm
                    </button>

                    <button class="btn btn-secondary btn-sm">
                        <i class="fas fa-redo"></i>
                        Reset
                    </button>
                </form>

                <div class="table-wrapper">

                    <table class="table">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>SĐT</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr th:each="u : ${users}">
                                <td class="id-cell" th:text="${u.id}"></td>

                                <td>
                                    <strong th:text="${u.username}"></strong>
                                </td>

                                <td th:text="${u.fullName}"></td>

                                <td th:text="${u.email}"></td>

                                <td th:text="${u.phone}"></td>

                                <td>
                                    <span
                                        th:classappend="${u.role.name()=='ADMIN'} ?
                                        'badge badge-danger' :
                                        (${u.role.name()=='MODERATOR'} ?
                                        'badge badge-warning' :
                                        'badge badge-info')"
                                        th:text="${u.role}">
                                    </span>
                                </td>

                                <td>
                                    <span
                                        th:classappend="${u.enabled} ?
                                        'badge badge-success' :
                                        'badge badge-danger'"
                                        th:text="${u.enabled} ? 'Hoạt động' : 'Đã khóa'">
                                    </span>
                                </td>

                                <td>

                                    <div class="action-btns">

                                        <button class="icon-btn view" title="Xem">
                                            <i class="fas fa-eye"></i>
                                        </button>

                                        <button class="icon-btn edit" title="Sửa">
                                            <i class="fas fa-pen"></i>
                                        </button>

                                        <button class="icon-btn delete" title="Xóa">
                                            <i class="fas fa-trash"></i>
                                        </button>

                                    </div>

                                </td>

                            </tr>

                            <tr th:if="${users.empty}">
                                <td colspan="8">

                                    <div class="empty-state">
                                        <i class="fas fa-users"></i>

                                        <h4>Chưa có người dùng nào</h4>

                                        <p>Nhấn "Thêm người dùng" để tạo mới.</p>

                                    </div>

                                </td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </main>

    </div>

    <th:block th:replace="~{admin/layout :: modalScripts}"></th:block>

</body>

</html>
