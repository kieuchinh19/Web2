<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quên mật khẩu - Kiều Chinh Cosmetics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Segoe UI,Arial,sans-serif;}
body{min-height:100vh;background:linear-gradient(180deg,#fff3f8 0%,#fff 60%);color:#34243c;}
.page-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{width:100%;max-width:720px;background:white;border-radius:28px;padding:40px;box-shadow:0 24px 60px rgba(206,72,134,0.16);}
.card h1{font-size:32px;color:#2f1c3b;margin-bottom:18px;}
.card p{font-size:16px;color:#69566c;line-height:1.8;margin-bottom:26px;}
.field-group{display:flex;flex-direction:column;gap:12px;margin-bottom:22px;}
.field-group label{font-weight:700;color:#6b516b;font-size:14px;}
.field-group input{padding:16px 18px;border:1px solid #ebd9e6;border-radius:16px;font-size:15px;color:#382941;outline:none;transition:all .22s ease;}
.field-group input:focus{border-color:#ff4f8b;box-shadow:0 0 0 4px rgba(255,79,139,0.12);}
.button-primary{width:100%;padding:16px 0;border:none;border-radius:18px;background:#ff4f8b;color:white;font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s ease;}
.button-primary:hover{transform:translateY(-1px);}
.back-link{display:inline-flex;margin-top:18px;color:#d81b60;font-weight:700;}
@media (max-width:680px){.card{padding:28px;}.card h1{font-size:28px;}}
</style>
</head>
<body>
<div class="page-shell">
  <div class="card">
    <h1>Quên mật khẩu</h1>
    <p>Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu. Chúng tôi sẽ gửi link phục hồi tới email đã đăng ký.</p>
    <form class="reset-form" novalidate>
      <div class="field-group">
        <label for="reset-email">Email đăng nhập</label>
        <input id="reset-email" name="resetEmail" type="email" placeholder="youremail@example.com" required>
      </div>
      <button class="button-primary" type="submit">Gửi liên kết đặt lại</button>
    </form>
    <a class="back-link" href="/login">← Quay lại Đăng nhập</a>
  </div>
</div>
<script>
document.querySelector('.reset-form').addEventListener('submit', function(event) {
  event.preventDefault();
  const email = this.resetEmail.value.trim();
  if (!email) {
    alert('Vui lòng nhập email của bạn.');
    return;
  }
  alert('Nếu email đã tồn tại, hướng dẫn đặt lại mật khẩu sẽ được gửi đến bạn.');
});
</script>
</body>
</html>
