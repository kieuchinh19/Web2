<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục sản phẩm - Kiều Chinh Cosmetics</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .category-page {
            max-width: 1280px;
            margin: 30px auto;
            padding: 0 80px;
        }

        .category-header {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .category-info h1 {
            font-size: 24px;
            color: #ff4f8b;
            margin-bottom: 6px;
        }

        .category-info p {
            font-size: 13px;
            color: #666;
        }

        .category-info p b {
            color: #ff4f8b;
            font-size: 16px;
        }

        .sort-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-bar label {
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }

        .sort-bar select {
            height: 38px;
            padding: 0 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            background: #fff;
        }

        .sort-bar select:focus {
            outline: none;
            border-color: #ff4f8b;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width:1024px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width:768px) {
            .category-page {
                padding: 0 16px;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
            transition: all .25s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(255, 79, 139, .18);
        }

        .product-card .img-wrap {
            width: 100%;
            height: 240px;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-card .info {
            padding: 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-card .name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.4;
            min-height: 38px;
        }

        .product-card .brand {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
        }

        .product-card .price {
            font-size: 16px;
            font-weight: 700;
            color: #ff4f8b;
            margin-top: auto;
        }

        .product-card .btn-cart {
            margin-top: 10px;
            width: 100%;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: #ff4f8b;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
        }

        .product-card .btn-cart:hover {
            background: #e73c78;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: #666;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .pagination a,
        .pagination span {
            min-width: 38px;
            height: 38px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #fff;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid #eee;
            transition: .2s;
        }

        .pagination a:hover {
            background: #ff4f8b;
            color: #fff;
            border-color: #ff4f8b;
        }

        .pagination .active {
            background: #ff4f8b;
            color: #fff;
            border-color: #ff4f8b;
        }

        .pagination .disabled {
            opacity: .4;
            pointer-events: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <div class="category-page">
        <div class="category-header">
            <div class="category-info">
                <h1 id="categoryName">Đang tải...</h1>
                <p>Có <b id="productCount">0</b> sản phẩm trong danh mục này</p>
            </div>
            <div class="sort-bar">
                <label for="sortSelect">Sắp xếp:</label>
                <select id="sortSelect" onchange="changeSort(this.value)">
                    <option value="newest">Mới nhất</option>
                    <option value="price-asc">Giá tăng dần</option>
                    <option value="price-desc">Giá giảm dần</option>
                    <option value="best-selling">Bán chạy</option>
                </select>
            </div>
        </div>

        <div id="productGrid" class="product-grid">
            <div class="loading" style="grid-column:1/-1;">Đang tải sản phẩm...</div>
        </div>

        <div id="pagination" class="pagination"></div>
    </div>

    <script th:inline="javascript">
        const categoryId = /*[[${categoryId}]]*/ 0;
        let currentPage = /*[[${currentPage}]]*/ 0;
        let currentSort = /*[[${currentSort}]]*/ 'newest';

        function formatPrice(price) {
            if (price == null) return '0 đ';
            return new Intl.NumberFormat('vi-VN').format(price) + ' đ';
        }

        async function loadCategory() {
            try {
                const resp = await fetch('/api/v1/categories/' + categoryId);
                const json = await resp.json();
                if (json.data) {
                    document.getElementById('categoryName').textContent = json.data.name || 'Danh mục';
                    document.title = (json.data.name || 'Danh mục') + ' - Kiều Chinh Cosmetics';
                }
            } catch (e) {
                document.getElementById('categoryName').textContent = 'Danh mục #' + categoryId;
            }
        }

        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '<div class="loading" style="grid-column:1/-1;">Đang tải sản phẩm...</div>';
            try {
                const url = '/api/v1/products/by-category-paged/' + categoryId
                    + '?page=' + currentPage
                    + '&size=12'
                    + '&sort=' + encodeURIComponent(currentSort);
                const resp = await fetch(url);
                const json = await resp.json();
                const pageData = json.data || {};
                const products = pageData.content || [];
                document.getElementById('productCount').textContent = pageData.totalElements || 0;
                if (products.length === 0) {
                    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">'
                        + '<i class="fas fa-box-open" style="display:block;"></i>'
                        + '<h3>Chưa có sản phẩm nào</h3>'
                        + '<p>Danh mục này hiện chưa có sản phẩm. Vui lòng quay lại sau!</p>'
                        + '</div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }
                grid.innerHTML = products.map(p => {
                    const img = p.image || 'https://via.placeholder.com/300x300/fdf2f8/ec4899?text=IMG';
                    const brand = p.brandName ? '<div class="brand">' + p.brandName + '</div>' : '';
                    return '<div class="product-card">'
                        + '<div class="img-wrap"><img src="' + img + '" onerror="this.src=\'https://via.placeholder.com/300x300/fdf2f8/ec4899?text=IMG\'" alt="' + p.name + '"></div>'
                        + '<div class="info">'
                        + '<div class="name">' + p.name + '</div>'
                        + brand
                        + '<div class="price">' + formatPrice(p.price) + '</div>'
                        + '<button class="btn-cart" onclick="addToCart(' + p.id + ', \'' + (p.name || '').replace(/'/g, "\\'") + '\')">'
                        + '<i class="fas fa-cart-plus"></i> Thêm vào giỏ</button>'
                        + '</div></div>';
                }).join('');
                renderPagination(pageData);
            } catch (e) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">'
                    + '<h3>Lỗi tải sản phẩm</h3>'
                    + '<p>' + (e.message || 'Vui lòng thử lại sau') + '</p></div>';
            }
        }

        function renderPagination(pageData) {
            const totalPages = pageData.totalPages || 0;
            const cur = pageData.number || 0;
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            const prevDisabled = cur === 0 ? 'disabled' : '';
            html += '<a href="#" class="' + prevDisabled + '" onclick="goPage(' + (cur - 1) + ');return false;"><i class="fas fa-chevron-left"></i></a>';
            const start = Math.max(0, cur - 2);
            const end = Math.min(totalPages - 1, cur + 2);
            if (start > 0) {
                html += '<a href="#" onclick="goPage(0);return false;">1</a>';
                if (start > 1) html += '<span>...</span>';
            }
            for (let i = start; i <= end; i++) {
                if (i === cur) html += '<span class="active">' + (i + 1) + '</span>';
                else html += '<a href="#" onclick="goPage(' + i + ');return false;">' + (i + 1) + '</a>';
            }
            if (end < totalPages - 1) {
                if (end < totalPages - 2) html += '<span>...</span>';
                html += '<a href="#" onclick="goPage(' + (totalPages - 1) + ');return false;">' + totalPages + '</a>';
            }
            const nextDisabled = cur >= totalPages - 1 ? 'disabled' : '';
            html += '<a href="#" class="' + nextDisabled + '" onclick="goPage(' + (cur + 1) + ');return false;"><i class="fas fa-chevron-right"></i></a>';
            container.innerHTML = html;
        }

        function goPage(p) {
            currentPage = p;
            const url = new URL(window.location.href);
            url.searchParams.set('page', p);
            url.searchParams.set('sort', currentSort);
            window.history.pushState({}, '', url);
            loadProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeSort(s) {
            currentSort = s;
            currentPage = 0;
            const url = new URL(window.location.href);
            url.searchParams.set('sort', s);
            url.searchParams.set('page', 0);
            window.history.pushState({}, '', url);
            loadProducts();
        }

        async function addToCart(productId, productName) {
            try {
                const resp = await fetch('/api/v1/header/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: productId, quantity: 1 })
                });
                if (resp.ok) {
                    alert('Đã thêm "' + productName + '" vào giỏ hàng!');
                } else {
                    alert('Không thể thêm vào giỏ hàng');
                }
            } catch (e) {
                alert('Lỗi: ' + e.message);
            }
        }

        document.getElementById('sortSelect').value = currentSort;
        loadCategory();
        loadProducts();
    </script>

    <script>
        // Load header từ trang chủ (tái sử dụng giao diện)
        fetch('/').then(r => r.text()).then(html => {
            const match = html.match(/<header[\s\S]*?<\/header>/);
            if (match) {
                const ph = document.getElementById('header-placeholder');
                if (ph) ph.innerHTML = match[0];
            }
        }).catch(() => { });
    </script>

</body>

</html>
