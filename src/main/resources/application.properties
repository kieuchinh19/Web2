spring.application.name=chinh
server.port=8080

# ===== MySQL DataSource =====
spring.datasource.url=jdbc:mysql://localhost:3306/web2
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# ===== Multipart (upload) =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true
# ===== Tomcat max request size (phòng trường hợp embed) =====
server.tomcat.max-swallow-size=20MB

# ===== Flyway Migration =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# Hibernate chỉ validate, không tự tạo lại schema khi đã có Flyway
spring.jpa.hibernate.ddl-auto=validate
